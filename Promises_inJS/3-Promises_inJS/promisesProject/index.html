<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promises in JavaScript</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            padding: 20px;
            margin: 10px 0;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #output {
            background-color: #f5f5f5;
            padding: 10px;
            margin-top: 10px;
            min-height: 30px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Promises in JavaScript</h1>
    
    <div class="container">
        <h2>Basic Promise Example</h2>
        <button onclick="basicPromise()">Run Basic Promise</button>
        <div id="output"></div>
    </div>

    <div class="container">
        <h2>Promise Chain</h2>
        <button onclick="promiseChain()">Run Promise Chain</button>
        <div id="output2"></div>
    </div>

    <div class="container">
        <h2>Async/Await Example</h2>
        <button onclick="asyncAwaitExample()">Run Async/Await</button>
        <div id="output3"></div>
    </div>

    <script src="promises.js"></script>
</body>
</html>
