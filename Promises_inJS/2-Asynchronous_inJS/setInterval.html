<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Stop Interval</title>
</head>
<body>
  <h1>Luffy is the JoyBoy</h1>
  <button id="start">Start</button>
  <button id="stop">Stop</button>

  <script>

    //const intervalID = setInterval(function(str){
    //  console.log(str, Date.now())
    //}, 1000, "Hi Luffy!")

    // clearInterval(intervalId)

    // Update version of this code is below ;


    const sayDate = function (str) { // str = "Hi Luffy!"
      console.log(str, Date.now());
    };

    let intervalId; // 🔑 store interval ID globally, Also intervalID is undefined and in JS undefined is a falsy value 

    // START button
    document.getElementById("start").addEventListener("click", function () {
      if (!intervalId) { // prevent multiple intervals
        /*
            This code means (!intervalId) this will be true when inervalID is undefined or null then it will return false, with the help of ! false value turns into true so this if statement will run. 
            [
            !intervalId === true 
            when? => intervalId === null
            ]
            ✔ Start interval only if it is not already running.

        */
        intervalId = setInterval(sayDate, 1000, "Hi Luffy!");
        /*
        We can use setInterval with both by refrencing the function or by using call back function method;
        intervalId = setInterval(function(str){
            console.log(str, Date.now())
        }, 1000, "Hi Luffy!")
        */
      };
    });

    // STOP button
    document.getElementById("stop").addEventListener("click", function () {
      clearInterval(intervalId);
      intervalId = null; // reset
    });
  </script>
</body>
</html>
