<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="playGame('rock');">Rock</button>

    <button onclick="playGame('paper');">Paper</button>

    <button onclick="playGame('scissors');">Scissors</button>

    <button onclick="resetScore();">Reset Score</button>

    <script>
      //let score = JSON.parse(localStorage.getItem('score')) || {wins: 0, losses: 0, ties: 0}; // We can do this also but below is better for understanding.

      const _stored = localStorage.getItem('score');
      //score is an object, and you already created it here 👇
      let score = _stored ? JSON.parse(_stored) : {wins: 0, losses: 0, ties: 0};  //  IF ? THEN : ELSE
      /*
      If _stored exists, then set score to JSON.parse(_stored)
      Else, set score to { wins: 0, losses: 0, ties: 0 }
      
      Same Code Withour Ternary Operator:
      let score;
      if (_stored) {
        score = JSON.parse(_stored);
      } else {
        score = { wins: 0, losses: 0, ties: 0 };
      } 

      */
       console.log(typeof score); // object

      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = '';

        if (playerMove === 'scissors') {
          if (computerMove === 'rock') {
            result = 'You lose.';
          } else if (computerMove === 'paper') {
            result = 'You win.';
          } else if (computerMove === 'scissors') {
            result = 'Tie.';
          }

        } else if (playerMove === 'paper') {
          if (computerMove === 'rock') {
            result = 'You win.';
          } else if (computerMove === 'paper') {
            result = 'Tie.';
          } else if (computerMove === 'scissors') {
            result = 'You lose.';
          }
          
        } else if (playerMove === 'rock') {
          if (computerMove === 'rock') {
            result = 'Tie.';
          } else if (computerMove === 'paper') {
            result = 'You lose.';
          } else if (computerMove === 'scissors') {
            result = 'You win.';
          }
        }

        if (result === 'You win.') {
          score.wins += 1;
        } else if (result === 'You lose.') {
          score.losses += 1;
        } else if (result === 'Tie.') {
          score.ties += 1;
        }

        localStorage.setItem('score', JSON.stringify(score));

        alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}
Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);
      }

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }

        return computerMove;
      }

      function resetScore() {
        score = {wins: 0, losses: 0, ties: 0};
        localStorage.removeItem('score');
        alert('Score reset.');
      }
    </script>
  </body>
</html>
