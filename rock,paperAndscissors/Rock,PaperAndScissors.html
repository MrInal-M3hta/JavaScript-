<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <style>
      body {
        padding:0px;
        margin:0px;
        background: black;
        color: white;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      }
      #heading {
        font-size: 30px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <p id="heading">Rock Paper Scissors</p>
    <button onclick="playGame('rock');">Rock</button>

    <button onclick="playGame('paper');">Paper</button>

    <button onclick="playGame('scissors');">Scissors</button>

    <p id="js-result"></p>

    <p id="js-moves"></p>

    <p id="js-score"></p>

    <button onclick="resetScore();">Reset Score</button>

    <script>
      //let score = JSON.parse(localStorage.getItem('score')) || {wins: 0, losses: 0, ties: 0}; // We can do this also but below is better for understanding.

      const _stored = localStorage.getItem('score');
      //score is an object, and you already created it here 👇
      let score = _stored ? JSON.parse(_stored) : {wins: 0, losses: 0, ties: 0};  //  IF ? THEN : ELSE
      /*
      If _stored exists, then set score to JSON.parse(_stored)
      Else, set score to { wins: 0, losses: 0, ties: 0 }
      
      Same Code Withour Ternary Operator:
      let score;
      if (_stored) {
        score = JSON.parse(_stored);
      } else {
        score = { wins: 0, losses: 0, ties: 0 };
      } 

      */
       console.log(typeof score); // object

       updateScoreElement();

      function playGame(playerMove) {
        // ✅ EARLY EXIT (defensive check)
        if (!playerMove) {
          console.log("User chose:", playerMove);
          return;
        }; // If playerMove does NOT exist or is invalid, stop the function immediately.

        const computerMove = pickComputerMove();

        let result = '';

        if (playerMove === 'scissors') {
          if (computerMove === 'rock') {
            result = 'You lose.';
          } else if (computerMove === 'paper') {
            result = 'You win.';
          } else if (computerMove === 'scissors') {
            result = 'Tie.';
          }

        } else if (playerMove === 'paper') {
          if (computerMove === 'rock') {
            result = 'You win.';
          } else if (computerMove === 'paper') {
            result = 'Tie.';
          } else if (computerMove === 'scissors') {
            result = 'You lose.';
          }
          
        } else if (playerMove === 'rock') {
          if (computerMove === 'rock') {
            result = 'Tie.';
          } else if (computerMove === 'paper') {
            result = 'You lose.';
          } else if (computerMove === 'scissors') {
            result = 'You win.';
          }
        }

        if (result === 'You win.') {
          score.wins += 1;
        } else if (result === 'You lose.') {
          score.losses += 1;
        } else if (result === 'Tie.') {
          score.ties += 1;
        }

        localStorage.setItem('score', JSON.stringify(score));

        updateScoreElement();

      const jsResult = document.getElementById("js-result");
      jsResult.textContent = result;

      const jsMoves = document.getElementById("js-moves");
      jsMoves.textContent = `You picked ${playerMove}. Computer picked ${computerMove}.`
      };

      function updateScoreElement(){
        const jsScore = document.getElementById("js-score");
       jsScore.textContent = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      };

      function pickComputerMove() {
        const randomNumber = Math.random();

        let computerMove = '';

        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = 'rock';
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = 'paper';
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = 'scissors';
        }

        return computerMove;
      }

      function resetScore() {
        score = {wins: 0, losses: 0, ties: 0};
        localStorage.removeItem('score');  
        updateScoreElement();
        const jsResult = document.getElementById("js-result");
        jsResult.textContent = "Play your Chance first";
        const jsMoves = document.getElementById("js-moves");
        jsMoves.textContent = "";
        // alert('Score reset.');
      }
    </script>
  </body>
</html>


<!--

1️⃣ Why do we use updateScoreElement() many times?

Short answer (exam-ready):

Because the score changes at different times, and the HTML must be updated every time the score changes.


🧠 Think of it like this

There are two things:
	•	score → JavaScript object (DATA)
	•	<p id="js-score"> → HTML (UI)

👉 Changing data does NOT automatically update HTML

So every time score changes, we must manually update the UI.

That’s exactly what updateScoreElement() does.

❓ Why not call it only once?

❌ Because JavaScript does not re-render HTML automatically
❌ HTML will still show old values



-->
