<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parent–Child Nodes in DOM</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .container {
      background: white;
      padding: 20px;
      margin: auto;
      width: 400px;
      border-radius: 5px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #e3e3ff;
      padding: 10px;
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      cursor: pointer;
    }

    .info {
      margin-top: 15px;
      background: #eee;
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h2>🌳 Parent–Child Nodes in DOM</h2>

  <div class="container">

    <input type="text" id="itemInput" placeholder="Enter item">
    <button id="addBtn">Add Item</button>

    <ul id="list">
      <li>Item 1 <button class="removeBtn">❌</button></li>
      <li>Item 2 <button class="removeBtn">❌</button></li>
    </ul>

    <button id="showInfo">Show Parent–Child Info</button>

    <div class="info" id="infoBox">
      Info will appear here...
    </div>

  </div>

  <script>
    // Selecting elements
    let addBtn = document.getElementById("addBtn");
    let itemInput = document.getElementById("itemInput");
    let list = document.getElementById("list");
    let infoBox = document.getElementById("infoBox");
    let showInfo = document.getElementById("showInfo");

    // ADD CHILD (li) TO PARENT (ul)
    addBtn.addEventListener("click", function () {

      if (itemInput.value === "") {
        alert("Please enter a value");
        return;
      };

      let li = document.createElement("li");     // child
      li.textContent = itemInput.value;

      let delBtn = document.createElement("button");
      delBtn.textContent = "❌";

      // REMOVE PARENT USING CHILD
      delBtn.addEventListener("click", function () {
        this.parentElement.remove();
      });

      li.appendChild(delBtn);    // button → li
      list.appendChild(li);      // li → ul

      itemInput.value = "";
    });

    // REMOVE EXISTING ITEMS
    list.addEventListener("click", function (e) {
      if (e.target.classList.contains("removeBtn")) {
        e.target.parentElement.remove();
      }
    });

    // SHOW PARENT–CHILD INFO
    showInfo.addEventListener("click", function () {

      infoBox.innerHTML = `
        <b>Parent Node:</b> ${list.parentElement.tagName}<br>
        <b>Total Child Elements:</b> ${list.children.length}<br>
        <b>First Child:</b> ${list.firstElementChild.textContent}<br>
        <b>Last Child:</b> ${list.lastElementChild.textContent}
      `;
    });
    /*
        div.container
        └── ul#list (parent)
            ├── li (child)
            │    └── button
            ├── li
            │    └── button
     */
  </script>



<!--

  🟢 PARENT NODES

1️⃣ parentNode

Returns any parent node (element, document, etc.)
javascript:
const parent = child.parentNode;
✔ Can return document
❌ Can return text nodes


2️⃣ parentElement (RECOMMENDED ✅)

Returns only element parents
javascript:
const parent = child.parentElement;
✔ Always returns an element or null
❌ Never returns text nodes



🟡 CHILD NODES

1️⃣ childNodes ⚠️

Returns ALL child nodes
	•	elements
	•	text (spaces, line breaks)
	•	comments
javascript:
const children = parent.childNodes;
✔ Access all node types
❌ Includes unwanted text nodes


2️⃣ children (MOST USED ✅)

Returns ONLY element children
javascript:
const children = parent.children;
✔ Only element nodes
❌ Excludes text nodes


3️⃣ firstChild vs firstElementChild

firstChild
Returns the first child node (any type)
javascript:
const first = parent.firstChild;
✔ Access any node type
❌ May return text nodes  

firstElementChild (RECOMMENDED ✅)
Returns the first child element
javascript:
const first = parent.firstElementChild;
✔ Always returns an element or null
❌ Never returns text nodes


4️⃣ lastChild vs lastElementChild

lastChild
Returns the last child node (any type)
javascript:
const last = parent.lastChild;
✔ Access any node type
❌ May return text nodes

lastElementChild (RECOMMENDED ✅)
Returns the last child element
javascript:
const last = parent.lastElementChild;
✔ Always returns an element or null
❌ Never returns text nodes



🔵 SIBLING NODES (Related to Parent-Child)

1️⃣ nextSibling vs nextElementSibling

nextSibling
Returns the next sibling node (any type)
javascript:
const next = node.nextSibling;
✔ Access any node type
❌ May return text nodes

nextElementSibling (RECOMMENDED ✅)
Returns the next sibling element
javascript:
const next = node.nextElementSibling;
✔ Always returns an element or null
❌ Never returns text nodes


2️⃣ previousSibling vs previousElementSibling

previousSibling
Returns the previous sibling node (any type)
javascript:
const prev = node.previousSibling;
✔ Access any node type
❌ May return text nodes

previousElementSibling (RECOMMENDED ✅)
Returns the previous sibling element
javascript:
const prev = node.previousElementSibling;
✔ Always returns an element or null
❌ Never returns text nodes



🔴 NODE TYPES (VERY IMPORTANT)
Each node has a nodeType property indicating its type:
1 - Element
2 - Attribute
3 - Text
8 - Comment
9 - Document
10 - DocumentType

JavaScript Example:
const nodeType = someNode.nodeType;


The document.create*() methods are used to create new nodes dynamically instead of writing HTML manually.
Method                    Purpose

createElement             Create HTML element
createTextNode            Create text
createAttribute           Create attribute
createComment             Create comment
createDocumentFragment    Fast multiple insert
createRange               DOM selection
createEvent               Old event creation




📌 append() in JavaScript (DOM)

append() is a modern DOM method used to add elements or text at the end of a parent element.
JavaScript:
parent.append(nodeOrText1, nodeOrText2, ...);

🟢 Basic Example

HTML:
<ul id="list"></ul>
JavaScript:
const list = document.getElementById("list");

const li = document.createElement("li");
li.textContent = "Item 1";

list.append(li);
➡️ Adds <li> at the end of <ul>

🟢 Append Text
JavaScript:
document.body.append("Hello World");
✔ You can append plain text directly


🟢 Append Multiple Nodes

Javascript:
const p1 = document.createElement("p");
p1.textContent = "Paragraph 1";

const p2 = document.createElement("p");
p2.textContent = "Paragraph 2";

document.body.append(p1, p2);
✔ Multiple elements in one line


🟢 Move Existing Element

JavaScript:
const box = document.getElementById("box");
document.body.append(box);
✔ Moves the element (does NOT copy)

🟢 Append vs appendChild (IMPORTANT)

append              appendChild
Multiple nodes      Single node
Text allowed        Node only
No return value     Returns node
Modern              Older

-->
