<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const user = {};
      Object.defineProperty(user, "email", {
        get() {
          return this._email;
        },
        set(value) {
          if (!value.includes("@")) {
            throw new Error("Invalid email");
          }
          this._email = value;
        },
        enumerable: true,
        configurable: true,
      });

      user.email = "test@example.com";
      console.log(user.email);
    </script>
  </body>
</html>
