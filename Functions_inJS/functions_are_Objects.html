<!DOCTYPE html>
<html>
<body>

<p>The 'arguments.length' property returns the number of arguments received by the function:</p>
<p>The 'toString()' method returns the function as a string:</p>

<p id="OnePiece"></p>

<script>

/*


The typeof operator in JavaScript returns "function" for functions.

But, JavaScript functions can best be described as objects.

JavaScript functions have both properties and methods.

*/


//The 'arguments.length' property returns the number of arguments received when the function was invoked:

function myFunction(a, b) {
  return arguments.length;
}
document.getElementById("OnePiece").innerHTML = myFunction(4, 3);


//The 'toString()' method returns the function as a string:


function myFunction(a, b) {
  return a * b;
}
document.getElementById("OnePiece").innerHTML = myFunction.toString();
</script>

</body>
</html>
