<!-- This JavaScript function always returns a random integer between min and max (both included): -->



<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Math</h1>
<h2>The Math.random() Method</h2>

<p>Every time you click the button, getRndInteger(10, 100) returns a random number between 10 and 100 (both included):</p>

<button onclick="document.getElementById('demo').innerHTML = getRndInteger(10,100)">Click Me</button>

<p id="demo"></p>

<script>
// This JavaScript function always returns a random integer between min and max (both included):
function getRndInteger(min, max) {
  return Math.floor(Math.random() * (max - min + 1) ) + min;
}
</script>

</body>
</html>
